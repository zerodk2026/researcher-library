<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>研究员库 - 投研成果管理系统</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="gh-config.js"></script>
<script src="gh-sync.js"></script>
</head>
<body>
<!-- 编辑模式提示 -->
<div id="edit-mode-banner" class="edit-mode-banner" style="display:none;">
  <span id="edit-banner-text">编辑模式已开启 — 你可以重命名/删除标的和记录。</span>
  <span class="edit-banner-actions" id="edit-banner-actions" style="display:none;margin-left:12px;">
    <button class="banner-btn" onclick="window._exportEdits()">导出编辑</button>
    <button class="banner-btn" onclick="window._resetEdits()">重置</button>
  </span>
</div>
<!-- 云同步状态栏 -->
<div id="sync-bar" class="sync-bar" style="display:none;">
  <div class="sync-info">
    <svg class="sync-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 1-9 9m0 0a9 9 0 0 1-9-9m9 9v-9m0 0a9 9 0 0 1 9-9m-9 9a9 9 0 0 1-9-9"/><path d="M3 12a9 9 0 0 1 9-9m0 0v9m0 0h9"/></svg>
    <span class="sync-label">云同步：</span>
    <span id="sync-status-text" class="sync-status-text">已连接</span>
    <span class="sync-sep">·</span>
    <span id="sync-last-time" class="sync-time">—</span>
  </div>
  <div class="sync-actions">
    <button class="banner-btn" id="sync-now-btn" onclick="window._syncNow()">立即同步</button>
    <button class="banner-btn" id="sync-settings-btn" onclick="window._openSyncSettings()">设置</button>
  </div>
</div>
<div id="app">
  <!-- 顶部栏 -->
  <header class="topbar">
    <div class="topbar-left">
      <h1 class="logo">研究员库</h1>
      <span class="badge" id="stat-badge">加载中...</span>
    </div>
    <div class="topbar-center">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="搜索研究员、标的、关键词..." autocomplete="off">
        <button class="search-clear" id="search-clear" style="display:none;">&times;</button>
      </div>
    </div>
    <div class="topbar-right">
      <button class="tab-btn active" data-tab="browse">浏览</button>
      <button class="tab-btn" data-tab="stats">统计</button>
    </div>
  </header>

  <div class="main-content">
    <!-- 浏览模式 -->
    <div id="tab-browse" class="tab-panel active">
      <!-- 左侧导航 -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">研究员列表</span>
          <select id="sort-select" class="sort-select">
            <option value="count">按记录数</option>
            <option value="name">按名称</option>
          </select>
        </div>
        <div class="filter-bar">
          <select id="filter-direction" class="filter-select">
            <option value="">全部方向</option>
          </select>
        </div>
        <div class="researcher-list" id="researcher-list"></div>
      </aside>

      <!-- 右侧内容 -->
      <main class="content-area">
        <div id="content-display"></div>
      </main>
    </div>

    <!-- 统计模式 -->
    <div id="tab-stats" class="tab-panel">
      <div class="stats-container">
        <div class="stats-cards" id="stats-cards"></div>
        <div class="stats-section">
          <h3 class="stats-section-title">研究员跟踪标的</h3>
          <p class="stats-section-desc">蓝色 = 近3个月有观点更新，灰色 = 超过3个月未更新</p>
          <div id="researcher-tracking"></div>
        </div>
        <div class="stats-section">
          <h3 class="stats-section-title">跟踪股票阶段表现</h3>
          <p class="stats-section-desc" id="quote-fetch-time">数据加载中...</p>
          <div class="stock-performance-table-wrapper">
            <table class="stock-performance-table" id="stock-performance"></table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
